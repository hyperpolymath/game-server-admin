  host.html — Main Gossamer host page for Game Server Admin

  This is the single-page shell that contains the sidebar navigation,
  content area with all seven panel divs, and the status bar.
  Panel content is embedded inline; switching is handled by showing/hiding
  the appropriate panel div.

  IPC bridge: all panels call window.gossamer.invoke(command, payload)
  which routes through Gossamer's IPC channel to Bridge.eph handlers.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Server Admin — Gossamer</title>
  <style>
    /* ====================================================================
       CSS Reset & Variables
       ==================================================================== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary:    #0d1117;
      --bg-sidebar:    #161b22;
      --bg-surface:    #161b22;
      --bg-elevated:   #1c2128;
      --border-color:  #30363d;
      --border-active: #58a6ff;
      --text-primary:  #c9d1d9;
      --text-secondary:#8b949e;
      --text-muted:    #484f58;
      --link-color:    #58a6ff;
      --success-color: #238636;
      --success-fg:    #3fb950;
      --danger-color:  #da3633;
      --danger-fg:     #f85149;
      --warning-color: #d29922;
      --warning-fg:    #d29922;
      --info-color:    #1f6feb;
      --purple-color:  #8957e5;
      --cyan-color:    #39d2c0;
      --font-ui:       system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono:     'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      --sidebar-width: 240px;
      --statusbar-height: 32px;
      --radius-sm:     4px;
      --radius-md:     6px;
      --radius-lg:     8px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ====================================================================
       Layout: Sidebar + Content + Status Bar
       ==================================================================== */
    .app-layout {
      display: flex;
      height: calc(100% - var(--statusbar-height));
    }

    /* ====================================================================
       Sidebar
       ==================================================================== */
    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      background-color: var(--bg-sidebar);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-logo {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--link-color), var(--purple-color));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .sidebar-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.2;
    }

    .sidebar-subtitle {
      font-size: 11px;
      color: var(--text-secondary);
    }

    .sidebar-nav {
      flex: 1;
      padding: 8px 0;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      cursor: pointer;
      color: var(--text-secondary);
      border-left: 3px solid transparent;
      transition: all 0.15s ease;
      user-select: none;
      position: relative;
    }

    .nav-item:hover {
      background-color: var(--bg-elevated);
      color: var(--text-primary);
    }

    .nav-item.active {
      color: var(--text-primary);
      border-left-color: var(--link-color);
      background-color: rgba(88, 166, 255, 0.08);
    }

    .nav-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      opacity: 0.7;
    }

    .nav-item.active .nav-icon {
      opacity: 1;
    }

    .nav-label {
      font-size: 13px;
      font-weight: 500;
      flex: 1;
    }

    .nav-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--text-muted);
      flex-shrink: 0;
    }

    .nav-status.connected {
      background-color: var(--success-fg);
    }

    /* ====================================================================
       Content Area
       ==================================================================== */
    .content-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      background-color: var(--bg-primary);
    }

    .panel-content {
      display: none;
      height: 100%;
      overflow-y: auto;
      padding: 20px 24px;
    }

    .panel-content.active {
      display: block;
    }

    /* ====================================================================
       Status Bar
       ==================================================================== */
    .status-bar {
      height: var(--statusbar-height);
      background-color: var(--bg-sidebar);
      border-top: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 20px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.green { background-color: var(--success-fg); }
    .status-dot.red   { background-color: var(--danger-fg); }
    .status-dot.yellow { background-color: var(--warning-fg); }

    .status-bar .spacer {
      flex: 1;
    }

    /* ====================================================================
       Shared Component Styles (used by all panels)
       ==================================================================== */
    .panel-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
    }

    .panel-header h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-green  { background: rgba(35,134,54,0.2); color: var(--success-fg); }
    .badge-red    { background: rgba(218,54,51,0.2); color: var(--danger-fg); }
    .badge-yellow { background: rgba(210,153,34,0.2); color: var(--warning-fg); }
    .badge-blue   { background: rgba(31,111,235,0.2); color: var(--link-color); }
    .badge-gray   { background: rgba(139,148,158,0.2); color: var(--text-secondary); }
    .badge-purple { background: rgba(137,87,229,0.2); color: var(--purple-color); }
    .badge-cyan   { background: rgba(57,210,192,0.2); color: var(--cyan-color); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      background-color: var(--bg-elevated);
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: var(--font-ui);
    }

    .btn:hover { background-color: #2d333b; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background-color: var(--info-color); border-color: var(--info-color); color: #fff; }
    .btn-primary:hover { background-color: #388bfd; }
    .btn-success { background-color: var(--success-color); border-color: var(--success-color); color: #fff; }
    .btn-success:hover { background-color: #2ea043; }
    .btn-danger  { background-color: var(--danger-color); border-color: var(--danger-color); color: #fff; }
    .btn-danger:hover { background-color: #f85149; }
    .btn-warning { background-color: var(--warning-color); border-color: var(--warning-color); color: #fff; }
    .btn-warning:hover { background-color: #e3b341; }
    .btn-purple  { background-color: var(--purple-color); border-color: var(--purple-color); color: #fff; }
    .btn-purple:hover { background-color: #a371f7; }
    .btn-cyan    { background-color: #0d9488; border-color: #0d9488; color: #fff; }
    .btn-cyan:hover { background-color: #14b8a6; }

    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-icon { padding: 6px 8px; }

    input[type="text"],
    input[type="number"],
    input[type="password"],
    select,
    textarea {
      background-color: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      padding: 6px 10px;
      font-size: 13px;
      font-family: var(--font-ui);
      outline: none;
      transition: border-color 0.15s ease;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--link-color);
    }

    textarea {
      font-family: var(--font-mono);
      resize: vertical;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border-color);
      background-color: var(--bg-surface);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    td {
      padding: 8px 12px;
      font-size: 13px;
      border-bottom: 1px solid var(--border-color);
    }

    tr:hover td {
      background-color: rgba(88, 166, 255, 0.04);
    }

    tr.selected td {
      background-color: rgba(88, 166, 255, 0.1);
    }

    .card {
      background-color: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 16px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .card-stat {
      text-align: center;
    }

    .card-stat .stat-value {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.2;
    }

    .card-stat .stat-label {
      font-size: 12px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .collapsible-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 600;
      user-select: none;
    }

    .collapsible-header:hover { color: var(--text-primary); }

    .collapsible-body {
      display: none;
      padding: 8px 0;
    }

    .collapsible-body.open {
      display: block;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.visible {
      display: flex;
    }

    .modal {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 24px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal h3 {
      font-size: 16px;
      margin-bottom: 12px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 16px;
    }

    .progress-bar {
      height: 6px;
      background: var(--bg-primary);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border-color);
      border-top-color: var(--link-color);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-secondary);
    }

    .empty-state .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.3;
    }

    /* ====================================================================
       Server Context Bar — persistent selected-server indicator
       ==================================================================== */
    .context-bar {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 10px 24px;
      background: linear-gradient(135deg, rgba(88,166,255,0.06) 0%, rgba(137,87,229,0.04) 100%);
      border-bottom: 1px solid var(--border-color);
      font-size: 13px;
      animation: fadeIn 0.2s ease;
    }

    .context-bar.visible {
      display: flex;
    }

    .context-bar .ctx-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      font-weight: 600;
    }

    .context-bar .ctx-server-name {
      font-weight: 600;
      color: var(--text-primary);
    }

    .context-bar .ctx-game {
      color: var(--link-color);
      font-weight: 500;
    }

    .context-bar .ctx-actions {
      margin-left: auto;
      display: flex;
      gap: 6px;
    }

    /* ====================================================================
       Game Cards — library / discovery view
       ==================================================================== */
    .game-card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .game-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .game-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--link-color), var(--purple-color));
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .game-card:hover {
      border-color: var(--link-color);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    .game-card:hover::before {
      opacity: 1;
    }

    .game-card-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-md);
      background: linear-gradient(135deg, var(--bg-elevated), var(--bg-primary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 12px;
      border: 1px solid var(--border-color);
    }

    .game-card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .game-card-meta {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .game-card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 12px;
    }

    .game-card-tag {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(88,166,255,0.1);
      color: var(--link-color);
      font-weight: 500;
    }

    .game-card-tag.steam {
      background: rgba(57,210,192,0.1);
      color: var(--cyan-color);
    }

    .game-card-tag.custom {
      background: rgba(137,87,229,0.1);
      color: var(--purple-color);
    }

    /* ====================================================================
       Server Cards — managed server instances
       ==================================================================== */
    .server-card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    .server-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      transition: all 0.2s ease;
      position: relative;
    }

    .server-card:hover {
      border-color: rgba(88,166,255,0.3);
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }

    .server-card.selected {
      border-color: var(--link-color);
      background: rgba(88,166,255,0.04);
    }

    .server-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .server-card-header .server-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .server-card-info {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
    }

    .server-card-info .info-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .server-card-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    /* ====================================================================
       Glowing Status Dots — animated status indicators
       ==================================================================== */
    .glow-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      position: relative;
    }

    .glow-dot.running {
      background: var(--success-fg);
      box-shadow: 0 0 6px var(--success-fg);
      animation: pulse-glow 2s ease-in-out infinite;
    }

    .glow-dot.stopped {
      background: var(--danger-fg);
    }

    .glow-dot.warning {
      background: var(--warning-fg);
      animation: pulse-glow-warn 2s ease-in-out infinite;
    }

    .glow-dot.unknown {
      background: var(--text-muted);
    }

    .glow-dot.installing {
      background: var(--link-color);
      animation: pulse-glow-blue 1s ease-in-out infinite;
    }

    /* ====================================================================
       Category Tabs — config editor section navigation
       ==================================================================== */
    .category-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 20px;
      overflow-x: auto;
    }

    .category-tab {
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s ease;
      white-space: nowrap;
      user-select: none;
    }

    .category-tab:hover {
      color: var(--text-primary);
      background: rgba(88,166,255,0.04);
    }

    .category-tab.active {
      color: var(--link-color);
      border-bottom-color: var(--link-color);
    }

    .category-tab .tab-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 9px;
      background: rgba(88,166,255,0.1);
      color: var(--link-color);
      font-size: 10px;
      font-weight: 600;
      margin-left: 6px;
    }

    .category-tab.cheat-tab {
      color: var(--purple-color);
    }

    .category-tab.cheat-tab.active {
      border-bottom-color: var(--purple-color);
    }

    .category-tab.cheat-tab .tab-count {
      background: rgba(137,87,229,0.15);
      color: var(--purple-color);
    }

    /* ====================================================================
       Config Sections — grouped settings with headers
       ==================================================================== */
    .config-section {
      margin-bottom: 24px;
      animation: fadeIn 0.25s ease;
    }

    .config-section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-color);
    }

    .config-section-header h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .config-section-header .section-icon {
      font-size: 16px;
      opacity: 0.7;
    }

    .cheat-indicator {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(137,87,229,0.12);
      color: var(--purple-color);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    /* ====================================================================
       Enhanced Form Groups — better field layout for config editor
       ==================================================================== */
    .field-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      margin-bottom: 8px;
      transition: border-color 0.15s ease;
    }

    .field-card:hover {
      border-color: rgba(88,166,255,0.2);
    }

    .field-card.changed {
      border-color: var(--link-color);
      background: rgba(88,166,255,0.03);
    }

    .field-card.cheat-field {
      border-left: 3px solid var(--purple-color);
    }

    .field-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .field-card-header .field-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .field-card-header .field-key {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-muted);
    }

    .field-card-header .field-default {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-muted);
    }

    .field-card-description {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .field-card-control {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .field-card-control input[type="text"],
    .field-card-control input[type="number"],
    .field-card-control input[type="password"],
    .field-card-control select {
      flex: 1;
    }

    /* ====================================================================
       Range Slider — styled range input for numeric fields
       ==================================================================== */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--link-color);
      border: 2px solid var(--bg-surface);
      box-shadow: 0 0 4px rgba(88,166,255,0.4);
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--link-color);
      border: 2px solid var(--bg-surface);
      box-shadow: 0 0 4px rgba(88,166,255,0.4);
      cursor: pointer;
    }

    .range-display {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .range-display input[type="range"] {
      flex: 1;
    }

    .range-display .range-value {
      min-width: 60px;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--link-color);
      background: rgba(88,166,255,0.08);
      padding: 4px 8px;
      border-radius: var(--radius-sm);
    }

    .range-display .range-bounds {
      font-size: 10px;
      color: var(--text-muted);
    }

    /* ====================================================================
       Search Hero — prominent search section for game discovery
       ==================================================================== */
    .search-hero {
      text-align: center;
      padding: 32px 24px 24px;
      margin-bottom: 24px;
    }

    .search-hero h2 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .search-hero p {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    .search-hero-bar {
      display: flex;
      gap: 8px;
      max-width: 600px;
      margin: 0 auto;
    }

    .search-hero-bar input {
      flex: 1;
      padding: 10px 16px;
      font-size: 15px;
      border-radius: var(--radius-lg);
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
    }

    .search-hero-bar input:focus {
      border-color: var(--link-color);
      box-shadow: 0 0 0 3px rgba(88,166,255,0.15);
    }

    .search-hero-bar button {
      padding: 10px 20px;
      font-size: 15px;
    }

    /* ====================================================================
       Setup Wizard — step-based server installation flow
       ==================================================================== */
    .wizard-steps {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 24px;
      padding: 16px 0;
    }

    .wizard-step {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .wizard-step .step-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      background: var(--bg-elevated);
      border: 2px solid var(--border-color);
      flex-shrink: 0;
    }

    .wizard-step.active {
      color: var(--text-primary);
    }

    .wizard-step.active .step-num {
      background: var(--link-color);
      border-color: var(--link-color);
      color: #fff;
    }

    .wizard-step.done {
      color: var(--success-fg);
    }

    .wizard-step.done .step-num {
      background: var(--success-color);
      border-color: var(--success-color);
      color: #fff;
    }

    .wizard-connector {
      flex: 1;
      height: 2px;
      background: var(--border-color);
      margin: 0 8px;
      min-width: 20px;
    }

    .wizard-connector.done {
      background: var(--success-color);
    }

    /* ====================================================================
       Toast Notifications
       ==================================================================== */
    .toast-container {
      position: fixed;
      bottom: 48px;
      right: 16px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: var(--bg-elevated);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 10px 16px;
      font-size: 13px;
      color: var(--text-primary);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      animation: slideUp 0.25s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      max-width: 360px;
    }

    .toast.toast-success { border-left: 3px solid var(--success-fg); }
    .toast.toast-error   { border-left: 3px solid var(--danger-fg); }
    .toast.toast-warning { border-left: 3px solid var(--warning-fg); }
    .toast.toast-info    { border-left: 3px solid var(--link-color); }

    /* ====================================================================
       Section Dividers — labeled horizontal rules
       ==================================================================== */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0 16px;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .section-divider::before,
    .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-color);
    }

    /* ====================================================================
       Config Path Prompt — when config file not found
       ==================================================================== */
    .path-prompt {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 24px;
      text-align: center;
      max-width: 560px;
      margin: 32px auto;
    }

    .path-prompt h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .path-prompt p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    .path-prompt .expected-path {
      font-family: var(--font-mono);
      font-size: 12px;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      margin-bottom: 16px;
      color: var(--text-secondary);
      word-break: break-all;
    }

    .path-prompt .path-input-row {
      display: flex;
      gap: 8px;
    }

    .path-prompt .path-input-row input {
      flex: 1;
    }

    /* ====================================================================
       Animations
       ==================================================================== */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 4px var(--success-fg); }
      50% { box-shadow: 0 0 10px var(--success-fg); }
    }

    @keyframes pulse-glow-warn {
      0%, 100% { box-shadow: 0 0 4px var(--warning-fg); }
      50% { box-shadow: 0 0 10px var(--warning-fg); }
    }

    @keyframes pulse-glow-blue {
      0%, 100% { box-shadow: 0 0 4px var(--link-color); }
      50% { box-shadow: 0 0 12px var(--link-color); }
    }

    .fade-in {
      animation: fadeIn 0.25s ease;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .toolbar .separator {
      width: 1px;
      height: 24px;
      background: var(--border-color);
      margin: 0 4px;
    }

    code, .code-block {
      font-family: var(--font-mono);
      font-size: 13px;
    }

    .code-block {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 12px;
      overflow-x: auto;
      white-space: pre;
      max-height: 400px;
      overflow-y: auto;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
    }

    .form-group.changed input,
    .form-group.changed select {
      border-color: var(--link-color);
      background-color: rgba(88, 166, 255, 0.05);
    }

    .form-group.invalid input,
    .form-group.invalid select {
      border-color: var(--danger-fg);
      background-color: rgba(248, 81, 73, 0.05);
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      display: inline-block;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--border-color);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .toggle-slider::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: transform 0.2s ease;
    }

    .toggle input:checked + .toggle-slider {
      background: var(--success-color);
    }

    .toggle input:checked + .toggle-slider::after {
      transform: translateX(16px);
    }

    /* Diff styles */
    .diff-added { background: rgba(35,134,54,0.15); color: var(--success-fg); }
    .diff-removed { background: rgba(218,54,51,0.15); color: var(--danger-fg); }
    .diff-context { color: var(--text-secondary); }
    .diff-line-num { color: var(--text-muted); min-width: 40px; text-align: right; padding-right: 8px; user-select: none; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body>

  <!-- ====================================================================

  <footer class="status-bar">

      <span class="status-dot red" id="verisimdb-status-dot"></span>
      <span id="verisimdb-status-text">Disconnected</span>
    </div>
    <div class="status-item">
      <span id="server-count">0 servers</span>

  <!-- Toast notification container -->

  <!-- ====================================================================
       Core JavaScript — Gossamer Bridge & Panel Management
       ==================================================================== -->
  <script>
    // =========================================================================
    // Gossamer IPC bridge
    // =========================================================================

    /**
     * Global state for the GSA application.
     * selectedServerId tracks which server is active across all panels.
     * panelTimers holds setInterval references for auto-refresh features.
     */
    const gsaState = {
      selectedServerId: null,
      selectedServerName: null,
      selectedServerGame: null,
      selectedServerStatus: 'unknown',
      servers: [],
      verisimdbConnected: false,
      panelTimers: {},
      activePanel: 'server-browser'
    };

    /**
     * Invoke a Gossamer IPC command. Returns a Promise that resolves with
     * the parsed JSON response from Bridge.eph.
     *
     * @param {string} command - The IPC command name (e.g. "list_servers")
     * @param {object} payload - The payload object (serialised to JSON)
     * @returns {Promise<object>} The parsed response
     */
    async function gossamerInvoke(command, payload) {
      try {
        if (window.gossamer && typeof window.gossamer.invoke === 'function') {
          const raw = await window.gossamer.invoke(command, JSON.stringify(payload || {}));
          return JSON.parse(raw);
        }
        // Fallback for development: return a mock error
        console.warn('[GSA] Gossamer bridge not available, command:', command);
        return { ok: false, error: 'Gossamer bridge not available' };
      } catch (err) {
        console.error('[GSA] IPC error:', command, err);
        return { ok: false, error: String(err) };
      }
    }

    // =========================================================================
    // Panel switching
    // =========================================================================

    /**
     * Switch the visible panel. Hides all panels, shows the target one,
     * updates sidebar active state, and triggers panel-specific init/refresh.
     *
     * @param {string} panelId - The panel identifier (e.g. "server-browser")
     */
    function switchPanel(panelId) {
      // Hide all panels
      document.querySelectorAll('.panel-content').forEach(function(el) {
        el.classList.remove('active');
      });

      // Deactivate all nav items
      document.querySelectorAll('.nav-item').forEach(function(el) {
        el.classList.remove('active');
      });

      // Show target panel
      var panel = document.getElementById('panel-' + panelId);
      if (panel) {
        panel.classList.add('active');
      }

      // Activate nav item
      var navItem = document.querySelector('.nav-item[data-panel="' + panelId + '"]');
      if (navItem) {
        navItem.classList.add('active');
      }

      gsaState.activePanel = panelId;

      // FLI provisioning: load required modules for this panel's clade traits
      provisionFLI(panelId);

      // Trigger panel-specific refresh
      switch (panelId) {
        case 'server-browser':   if (typeof refreshServerBrowser === 'function') refreshServerBrowser(); break;
        case 'config-editor':    if (typeof refreshConfigEditor === 'function') refreshConfigEditor(); break;
        case 'server-actions':   if (typeof refreshServerActions === 'function') refreshServerActions(); break;
        case 'live-logs':        if (typeof refreshLiveLogs === 'function') refreshLiveLogs(); break;
        case 'health-dashboard': if (typeof refreshHealthDashboard === 'function') refreshHealthDashboard(); break;
        case 'config-history':   if (typeof refreshConfigHistory === 'function') refreshConfigHistory(); break;
        case 'cross-search':     break; // No auto-refresh for search
      }
    }

    // =========================================================================
    // Status bar updates
    // =========================================================================

    /**
     * Update the status bar with current connection info.
     *
     * @param {object} data - Status data with fields: connected, serverCount, lastProbe
     */
    function updateStatusBar(data) {
      var dot = document.getElementById('verisimdb-status-dot');
      var text = document.getElementById('verisimdb-status-text');
      var count = document.getElementById('server-count');
      var probe = document.getElementById('last-probe-time');

      if (data.connected) {
        dot.className = 'status-dot green';
        text.textContent = 'Connected';
        gsaState.verisimdbConnected = true;
      } else {
        dot.className = 'status-dot red';
        text.textContent = 'Disconnected';
        gsaState.verisimdbConnected = false;
      }

      if (typeof data.serverCount === 'number') {
        count.textContent = data.serverCount + ' server' + (data.serverCount !== 1 ? 's' : '');
      }

      if (data.lastProbe) {
        probe.textContent = 'Last probe: ' + data.lastProbe;
      }
    }

    /**
     * Set the status indicator dot for a nav item.
     *
     * @param {string} panelId - The panel identifier
     * @param {boolean} connected - Whether the panel's data source is connected
     */
    function setPanelStatus(panelId, connected) {
      var dot = document.getElementById('status-' + panelId);
      if (dot) {
        dot.className = connected ? 'nav-status connected' : 'nav-status';
      }
    }

    // =========================================================================
    // Shared utility functions
    // =========================================================================

    /**
     * Format a timestamp into a human-readable relative or absolute time.
     *
     * @param {string|number} ts - ISO timestamp or Unix epoch milliseconds
     * @returns {string} Formatted time string
     */
    function formatTime(ts) {
      if (!ts) return '—';
      var d = new Date(ts);
      var now = new Date();
      var diffMs = now - d;
      var diffSec = Math.floor(diffMs / 1000);
      if (diffSec < 60) return diffSec + 's ago';
      if (diffSec < 3600) return Math.floor(diffSec / 60) + 'm ago';
      if (diffSec < 86400) return Math.floor(diffSec / 3600) + 'h ago';
      return d.toLocaleDateString() + ' ' + d.toLocaleTimeString();
    }

    /**
     * Escape HTML entities to prevent XSS in rendered content.
     *
     * @param {string} str - Raw string
     * @returns {string} Escaped string safe for innerHTML
     */
    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    /**
     * Toggle a collapsible section's visibility.
     *
     * @param {HTMLElement} header - The collapsible header element
     */
    function toggleCollapsible(header) {
      var body = header.nextElementSibling;
      if (body) {
        body.classList.toggle('open');
        var arrow = header.querySelector('.collapse-arrow');
        if (arrow) {
          arrow.textContent = body.classList.contains('open') ? '\u25BC' : '\u25B6';
        }
      }
    }

    /**
     * Show a modal overlay by ID.
     *
     * @param {string} modalId - The modal overlay element ID
     */
    function showModal(modalId) {
      var el = document.getElementById(modalId);
      if (el) el.classList.add('visible');
    }

    /**
     * Hide a modal overlay by ID.
     *
     * @param {string} modalId - The modal overlay element ID
     */
    function hideModal(modalId) {
      var el = document.getElementById(modalId);
      if (el) el.classList.remove('visible');
    }

    /**
     * Select a server globally — sets the active server across all panels.
     * Dispatches a custom event so panels can react.
     *
     * @param {string} id - Server ID
     * @param {string} name - Server display name
     * @param {string} game - Game type identifier
     * @param {string} status - Server status (running/stopped/unknown)
     */
    function selectServerGlobal(id, name, game, status) {
      gsaState.selectedServerId = id;
      gsaState.selectedServerName = name || id;
      gsaState.selectedServerGame = game || 'unknown';
      gsaState.selectedServerStatus = status || 'unknown';
      document.dispatchEvent(new CustomEvent('gsa-server-selected', {
        detail: { id: id, name: name, game: game, status: status }
      }));
    }

    // =========================================================================
    // Panel HTML loading (inline include)
    // =========================================================================

    /**
     * Load panel HTML from file paths and inject into panel containers.
     * In production Gossamer, these are embedded at build time.
     * For development, we use fetch() to load them.
     */
    async function loadPanelContent() {
      var panels = [
        { id: 'server-browser',   path: 'src/gui/panels/server-browser/panel.html' },
        { id: 'config-editor',    path: 'src/gui/panels/config-editor/panel.html' },
        { id: 'server-actions',   path: 'src/gui/panels/server-actions/panel.html' },
        { id: 'live-logs',        path: 'src/gui/panels/live-logs/panel.html' },
        { id: 'health-dashboard', path: 'src/gui/panels/health-dashboard/panel.html' },
        { id: 'config-history',   path: 'src/gui/panels/config-history/panel.html' },
        { id: 'cross-search',     path: 'src/gui/panels/cross-search/panel.html' }
      ];

      for (var i = 0; i < panels.length; i++) {
        var p = panels[i];
        try {
          var resp = await fetch(p.path);
          if (resp.ok) {
            var html = await resp.text();
            var container = document.getElementById('panel-' + p.id);
            if (container) {
              container.innerHTML = html;
              // Execute any script tags in the loaded HTML
              container.querySelectorAll('script').forEach(function(oldScript) {
                var newScript = document.createElement('script');
                newScript.textContent = oldScript.textContent;
                oldScript.parentNode.replaceChild(newScript, oldScript);
              });
            }
          }
        } catch (err) {
          console.warn('[GSA] Failed to load panel:', p.id, err);
        }
      }
    }

    // =========================================================================
    // Initialisation
    // =========================================================================

    /**
     * Application boot sequence:
     * 1. Load all panel HTML
     * 2. Check VeriSimDB connectivity
     * 3. Load initial server list
     * 4. Start status bar polling
     */
    async function initGSA() {
      await loadPanelContent();

      // Check VeriSimDB connection
      var healthResp = await gossamerInvoke('get_health', {});
      if (healthResp.ok) {
        updateStatusBar({ connected: true, serverCount: 0, lastProbe: null });
        setPanelStatus('health-dashboard', true);
      } else {
        updateStatusBar({ connected: false, serverCount: 0, lastProbe: null });
      }

      // Load initial server list
      var serversResp = await gossamerInvoke('list_servers', {});
      if (serversResp.ok && serversResp.data) {
        var servers = Array.isArray(serversResp.data) ? serversResp.data : [];
        gsaState.servers = servers;
        updateStatusBar({
          connected: true,
          serverCount: servers.length,
          lastProbe: new Date().toLocaleTimeString()
        });
        // Set all panel statuses to connected
        ['server-browser', 'config-editor', 'server-actions', 'live-logs',
         'health-dashboard', 'config-history', 'cross-search'].forEach(function(pid) {
          setPanelStatus(pid, true);
        });
      }

      // Trigger initial panel refresh
      if (typeof refreshServerBrowser === 'function') {
        refreshServerBrowser();
      }

      // Status bar polling every 30 seconds
      setInterval(async function() {
        var resp = await gossamerInvoke('get_health', {});
        updateStatusBar({
          connected: resp.ok,
          serverCount: gsaState.servers.length,
          lastProbe: new Date().toLocaleTimeString()
        });
      }, 30000);
    }

    // =========================================================================
    // FLI Provisioner — load/unload FLI modules based on panel clade traits
    // =========================================================================

    /**
     * FLI (Frontend-user Library Interface) module registry.
     *
     * Follows the Groove pattern: panels start bare — they work fine alone.
     * When the FLI provisioner activates, it probes which modules are
     * available (like Groove probing nearby ports), negotiates capabilities
     * (which FLI traits does this panel's clade inherit?), and activates
     * matching modules. If a module fails to load, the panel keeps working
     * with its fallback rendering — just like Gossamer works without Burble.
     *
     * Groove analogy:
     *   Panel = Guitar (works unplugged)
     *   FLI module = Amplifier (enhances when connected)
     *   Clade trait = The 1/4" jack (shared interface)
     *   provisionFLI() = Plugging in (discover → negotiate → light up)
     *
     * Module lifecycle:
     *   1. Panel activates → provisionFLI(panelId) called
     *   2. Provisioner reads panel's clade traits (panelTraits map)
     *   3. Required modules loaded on-demand (cached after first load)
     *   4. Panel's fliInit_* hook called to wire up capabilities
     *   5. Panel deactivates → modules stay cached, no teardown needed
     */
    var fliRegistry = {
      /** Map of module name → {path, loaded, element} */
      modules: {
        'fli-gauge':    { path: 'src/gui/fli/fli-gauge.js',    loaded: false, element: null },
        'fli-editable': { path: 'src/gui/fli/fli-editable.js', loaded: false, element: null },
        'fli-terminal': { path: 'src/gui/fli/fli-terminal.js', loaded: false, element: null },
        'fli-tooltip':  { path: 'src/gui/fli/fli-tooltip.js',  loaded: false, element: null },
        'fli-undo':     { path: 'src/gui/fli/fli-undo.js',     loaded: false, element: null }
      },

      /** Map of panel ID → array of required FLI module names (clade inheritance) */
      panelTraits: {
        'server-browser':   ['fli-tooltip'],
        'config-editor':    ['fli-editable', 'fli-tooltip', 'fli-undo'],
        'server-actions':   ['fli-terminal'],
        'live-logs':        ['fli-terminal'],
        'health-dashboard': ['fli-gauge', 'fli-tooltip'],
        'config-history':   ['fli-editable'],
        'cross-search':     ['fli-tooltip']
      }
    };

    /**
     * Provision FLI modules for a panel. Loads any modules that haven't
     * been loaded yet, then calls the panel's FLI init hook if it exists.
     *
     * @param {string} panelId - The panel being activated
     * @returns {Promise} Resolves when all required modules are loaded
     */
    async function provisionFLI(panelId) {
      var traits = fliRegistry.panelTraits[panelId] || [];
      var loadPromises = [];

      traits.forEach(function(moduleName) {
        var mod = fliRegistry.modules[moduleName];
        if (!mod) return;

        if (!mod.loaded) {
          loadPromises.push(loadFLIModule(moduleName, mod.path));
        }
      });

      if (loadPromises.length > 0) {
        await Promise.all(loadPromises);
        console.log('[FLI] Provisioned ' + traits.join(', ') + ' for ' + panelId);
      }

      // Call panel-specific FLI init hook
      var initHook = 'fliInit_' + panelId.replace(/-/g, '_');
      if (typeof window[initHook] === 'function') {
        window[initHook]();
      }
    }

    /**
     * Load a single FLI module by injecting a <script> tag.
     *
     * @param {string} name - Module name (e.g. 'fli-gauge')
     * @param {string} path - Path to the JS file
     * @returns {Promise} Resolves when the script is loaded
     */
    function loadFLIModule(name, path) {
      return new Promise(function(resolve, reject) {
        var mod = fliRegistry.modules[name];
        if (mod.loaded) { resolve(); return; }

        var script = document.createElement('script');
        script.src = path;
        script.async = true;
        script.onload = function() {
          mod.loaded = true;
          mod.element = script;
          console.log('[FLI] Loaded module: ' + name);
          resolve();
        };
        script.onerror = function() {
          console.warn('[FLI] Failed to load module: ' + name + ' from ' + path);
          resolve(); // Don't block panel loading on FLI failure
        };
        document.head.appendChild(script);
      });
    }

    /**
     * Check if a specific FLI module is loaded and available.
     *
     * @param {string} moduleName - The FLI module name
     * @returns {boolean} True if the module is loaded
     */
    function isFLIReady(moduleName) {
      var mod = fliRegistry.modules[moduleName];
      return mod ? mod.loaded : false;
    }

    // =========================================================================
    // Toast notifications
    // =========================================================================

    /**
     * Show a toast notification.
     *
     * @param {string} message - The message to display
     * @param {string} type - Toast type: "success", "error", "warning", "info"
     * @param {number} duration - Auto-dismiss time in ms (default 4000)
     */
    function showToast(message, type, duration) {
      type = type || 'info';
      duration = duration || 4000;

      var container = document.getElementById('toast-container');
      if (!container) return;

      var toast = document.createElement('div');
      toast.className = 'toast toast-' + type;
      toast.textContent = message;
      container.appendChild(toast);

      setTimeout(function() {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(8px)';
        toast.style.transition = 'all 0.2s ease';
        setTimeout(function() { toast.remove(); }, 200);
      }, duration);
    }

    // =========================================================================
    // Server context bar management
    // =========================================================================

    /**
     * Update the server context bar when a server is selected/deselected.
     * Called automatically via the gsa-server-selected event.
     */
    function updateContextBar() {
      var bar = document.getElementById('server-context-bar');
      if (!bar) return;

      if (gsaState.selectedServerId) {
        bar.classList.add('visible');
        document.getElementById('ctx-server-name').textContent =
          gsaState.selectedServerName || gsaState.selectedServerId;
        document.getElementById('ctx-game-name').textContent =
          gsaState.selectedServerGame || '';

        var dot = document.getElementById('ctx-status-dot');
        dot.className = 'glow-dot ' + (gsaState.selectedServerStatus || 'unknown');
      } else {
        bar.classList.remove('visible');
      }
    }

    /**
     * Clear the current server selection and hide the context bar.
     */
    function clearServerSelection() {
      gsaState.selectedServerId = null;
      gsaState.selectedServerName = null;
      gsaState.selectedServerGame = null;
      gsaState.selectedServerStatus = 'unknown';
      updateContextBar();
      document.dispatchEvent(new CustomEvent('gsa-server-selected', { detail: null }));
    }

    // Listen for server selections to update the context bar
    document.addEventListener('gsa-server-selected', updateContextBar);

    // Boot the application when the DOM is ready
    document.addEventListener('DOMContentLoaded', initGSA);
  </script>
</body>
</html>
