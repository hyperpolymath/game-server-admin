  config-editor/panel.html — Config Editor panel for Game Server Admin

  Dynamic form-based config editor that renders fields from A2ML metadata.
  Supports string, int, float, bool, secret, and enum field types.
  Includes a diff viewer and raw config preview.
  Calls gossamer IPC: get_config, set_config, revert_config.
-->

<!-- Header -->
<div class="panel-header">
  <h2>Config Editor</h2>
  <span class="badge badge-gray" id="ce-server-badge">No server selected</span>
  <span class="badge badge-blue" id="ce-game-badge" style="display:none;"></span>
  <div style="flex:1;"></div>
  <button class="btn btn-sm" onclick="refreshConfigEditor()" id="ce-refresh-btn">&#x21BB; Refresh</button>
  <button class="btn btn-sm btn-primary" onclick="saveConfig()" id="ce-save-btn" disabled>Save Changes</button>
  <button class="btn btn-sm" onclick="revertConfig()" id="ce-revert-btn" disabled>Revert</button>
</div>

<!-- No server selected state -->
<div class="empty-state" id="ce-empty-state">
  <div class="empty-icon">&#x2699;</div>
  <p>Select a server from the Server Browser to edit its configuration.</p>
</div>

<!-- Config form container -->
<div id="ce-form-container" style="display:none;">
  <!-- Loading indicator -->
  <div id="ce-loading" style="display:none; text-align:center; padding:24px;">
    <span class="spinner"></span>
    <p style="color:var(--text-secondary); margin-top:8px;">Loading configuration...</p>
  </div>

  <!-- Dynamic config form -->
  <div id="ce-form" style="display:grid; grid-template-columns:1fr 1fr; gap:12px 24px;">
    <!-- Fields rendered dynamically by renderConfigForm() -->
  </div>

  <!-- Changed fields counter -->
  <div id="ce-change-info" style="margin-top:16px; padding:8px 12px; border-radius:var(--radius-md); background:rgba(88,166,255,0.08); border:1px solid rgba(88,166,255,0.2); display:none;">
    <span style="color:var(--link-color); font-weight:600;" id="ce-change-count">0</span>
    <span style="color:var(--text-secondary);"> field(s) changed</span>
  </div>

  <!-- Diff panel (collapsible) -->
  <div style="margin-top:20px;">
    <div class="collapsible-header" onclick="toggleCollapsible(this)">
      <span class="collapse-arrow">&#x25B6;</span> Changes Diff
    </div>
    <div class="collapsible-body">
      <div id="ce-diff-container" class="code-block" style="max-height:300px; font-size:12px;">
        <span style="color:var(--text-secondary);">No changes yet.</span>
      </div>
    </div>
  </div>

  <!-- Raw preview (collapsible) -->
  <div style="margin-top:12px;">
    <div class="collapsible-header" onclick="toggleCollapsible(this)">
      <span class="collapse-arrow">&#x25B6;</span> Raw Config Preview
    </div>
    <div class="collapsible-body">
      <div id="ce-raw-preview" class="code-block" style="max-height:400px;">
        <span style="color:var(--text-secondary);">Load a config to see the raw format.</span>
      </div>
    </div>
  </div>
</div>

<script>
  /**
   * Config Editor state.
   * originalConfig: the config as loaded from the server (for diff comparison).
   * currentConfig: the current form values (mutated by user edits).
   * fieldMeta: A2ML field metadata array describing each config field.
   */
  var ceState = {
    originalConfig: {},
    currentConfig: {},
    fieldMeta: [],
    rawFormat: 'json',
    rawText: ''
  };

  /**
   * Refresh the config editor. If a server is selected, loads its config
   * and renders the dynamic form. Otherwise shows the empty state.
   */
  async function refreshConfigEditor() {
    var emptyState = document.getElementById('ce-empty-state');
    var formContainer = document.getElementById('ce-form-container');
    var serverBadge = document.getElementById('ce-server-badge');
    var gameBadge = document.getElementById('ce-game-badge');

    if (!gsaState.selectedServerId) {
      emptyState.style.display = 'block';
      formContainer.style.display = 'none';
      serverBadge.textContent = 'No server selected';
      serverBadge.className = 'badge badge-gray';
      gameBadge.style.display = 'none';
      return;
    }

    emptyState.style.display = 'none';
    formContainer.style.display = 'block';
    serverBadge.textContent = gsaState.selectedServerName || gsaState.selectedServerId;
    serverBadge.className = 'badge badge-blue';

    if (gsaState.selectedServerGame) {
      gameBadge.textContent = gsaState.selectedServerGame;
      gameBadge.style.display = 'inline-flex';
    }

    // Show loading
    document.getElementById('ce-loading').style.display = 'block';
    document.getElementById('ce-form').style.display = 'none';

    var resp = await gossamerInvoke('get_config', { server_id: gsaState.selectedServerId });

    document.getElementById('ce-loading').style.display = 'none';
    document.getElementById('ce-form').style.display = 'grid';

    if (!resp.ok) {
      document.getElementById('ce-form').innerHTML =
        '<div style="grid-column:1/-1;color:var(--danger-fg);">Failed to load config: ' + escapeHtml(resp.error) + '</div>';
      return;
    }

    var live = resp.data.live || {};
    ceState.fieldMeta = live.fields || [];
    ceState.originalConfig = {};
    ceState.currentConfig = {};
    ceState.rawFormat = live.format || 'json';
    ceState.rawText = live.raw || '';

    // Build original config map from fields
    ceState.fieldMeta.forEach(function(f) {
      ceState.originalConfig[f.key] = f.value;
      ceState.currentConfig[f.key] = f.value;
    });

    renderConfigForm(ceState.fieldMeta);
    renderRawPreview(ceState.rawFormat, ceState.rawText);
    updateChangeState();
  }

  /**
   * Render the dynamic config form from A2ML field metadata.
   * Each field is rendered as the appropriate input type based on its
   * metadata: string, int, float, bool, secret, enum.
   *
   * @param {Array} fields - Array of field metadata objects
   */
  function renderConfigForm(fields) {
    var form = document.getElementById('ce-form');
    if (!form || !fields || fields.length === 0) {
      if (form) form.innerHTML = '<div style="grid-column:1/-1;" class="empty-state"><p>No configuration fields found.</p></div>';
      return;
    }

    var html = '';
    fields.forEach(function(field) {
      var key = escapeHtml(field.key || '');
      var label = escapeHtml(field.label || field.key || '');
      var type = field.type || 'string';
      var value = field.value !== undefined ? field.value : '';
      var defaultVal = field.default !== undefined ? field.default : '';
      var description = escapeHtml(field.description || '');

      html += '<div class="form-group" id="ce-group-' + key + '" data-field-key="' + key + '">';
      html += '<label title="' + description + '">' + label + '</label>';

      switch (type) {
        case 'bool':
          html += '<label class="toggle">';
          html += '<input type="checkbox" data-key="' + key + '" onchange="onFieldChange(\'' + key + '\', this.checked)" ' + (value ? 'checked' : '') + ' />';
          html += '<span class="toggle-slider"></span>';
          html += '</label>';
          break;

        case 'int':
          var min = field.range ? field.range.min : '';
          var max = field.range ? field.range.max : '';
          html += '<input type="number" data-key="' + key + '" value="' + escapeHtml(String(value)) + '" '
            + 'placeholder="' + escapeHtml(String(defaultVal)) + '" '
            + (min !== '' ? 'min="' + min + '" ' : '')
            + (max !== '' ? 'max="' + max + '" ' : '')
            + 'step="1" onchange="onFieldChange(\'' + key + '\', parseInt(this.value))" />';
          break;

        case 'float':
          var fmin = field.range ? field.range.min : '';
          var fmax = field.range ? field.range.max : '';
          html += '<input type="number" data-key="' + key + '" value="' + escapeHtml(String(value)) + '" '
            + 'placeholder="' + escapeHtml(String(defaultVal)) + '" '
            + (fmin !== '' ? 'min="' + fmin + '" ' : '')
            + (fmax !== '' ? 'max="' + fmax + '" ' : '')
            + 'step="0.1" onchange="onFieldChange(\'' + key + '\', parseFloat(this.value))" />';
          break;

        case 'secret':
          html += '<div style="display:flex;gap:4px;">';
          html += '<input type="password" data-key="' + key + '" value="' + escapeHtml(String(value)) + '" '
            + 'placeholder="' + escapeHtml(String(defaultVal)) + '" '
            + 'onchange="onFieldChange(\'' + key + '\', this.value)" style="flex:1;" />';
          html += '<button class="btn btn-sm btn-icon" onclick="toggleSecretVisibility(this)" title="Show/Hide">&#x1F441;</button>';
          html += '</div>';
          break;

        case 'enum':
          html += '<select data-key="' + key + '" onchange="onFieldChange(\'' + key + '\', this.value)">';
          var options = field.options || [];
          options.forEach(function(opt) {
            var optVal = typeof opt === 'object' ? opt.value : opt;
            var optLabel = typeof opt === 'object' ? (opt.label || opt.value) : opt;
            var selected = String(optVal) === String(value) ? ' selected' : '';
            html += '<option value="' + escapeHtml(String(optVal)) + '"' + selected + '>' + escapeHtml(String(optLabel)) + '</option>';
          });
          html += '</select>';
          break;

        default: // string
          html += '<input type="text" data-key="' + key + '" value="' + escapeHtml(String(value)) + '" '
            + 'placeholder="' + escapeHtml(String(defaultVal)) + '" '
            + 'onchange="onFieldChange(\'' + key + '\', this.value)" />';
      }

      if (description) {
        html += '<small style="color:var(--text-muted);font-size:11px;">' + description + '</small>';
      }

      html += '</div>';
    });

    form.innerHTML = html;
  }

  /**
   * Handle a field value change. Updates the current config, marks
   * the form group as changed/unchanged, and updates the change counter.
   *
   * @param {string} key - The config field key
   * @param {*} value - The new value
   */
  function onFieldChange(key, value) {
    ceState.currentConfig[key] = value;

    var group = document.getElementById('ce-group-' + key);
    if (group) {
      var original = ceState.originalConfig[key];
      var changed = String(value) !== String(original);
      group.className = 'form-group' + (changed ? ' changed' : '');
    }

    updateChangeState();
  }

  /**
   * Update the change counter, save/revert button states, and diff view
   * based on the current config vs. the original config.
   */
  function updateChangeState() {
    var changes = [];
    Object.keys(ceState.currentConfig).forEach(function(key) {
      if (String(ceState.currentConfig[key]) !== String(ceState.originalConfig[key])) {
        changes.push({ key: key, old: ceState.originalConfig[key], new: ceState.currentConfig[key] });
      }
    });

    var hasChanges = changes.length > 0;
    document.getElementById('ce-save-btn').disabled = !hasChanges;
    document.getElementById('ce-revert-btn').disabled = !hasChanges;

    var changeInfo = document.getElementById('ce-change-info');
    if (hasChanges) {
      changeInfo.style.display = 'block';
      document.getElementById('ce-change-count').textContent = changes.length;
    } else {
      changeInfo.style.display = 'none';
    }

    // Update diff
    showDiff(changes);
  }

  /**
   * Render a diff view of the changed fields, showing old vs. new values.
   *
   * @param {Array} changes - Array of {key, old, new} change objects
   */
  function showDiff(changes) {
    var container = document.getElementById('ce-diff-container');
    if (!container) return;

    if (changes.length === 0) {
      container.innerHTML = '<span style="color:var(--text-secondary);">No changes yet.</span>';
      return;
    }

    var html = '';
    changes.forEach(function(c) {
      html += '<div class="diff-removed">- ' + escapeHtml(c.key) + ' = ' + escapeHtml(String(c.old)) + '</div>';
      html += '<div class="diff-added">+ ' + escapeHtml(c.key) + ' = ' + escapeHtml(String(c.new)) + '</div>';
      html += '<div class="diff-context"></div>';
    });
    container.innerHTML = html;
  }

  /**
   * Render the raw config preview in its original format.
   *
   * @param {string} format - The config format (json, ini, xml, etc.)
   * @param {string} text - The raw config text
   */
  function renderRawPreview(format, text) {
    var container = document.getElementById('ce-raw-preview');
    if (!container) return;
    if (!text) {
      container.innerHTML = '<span style="color:var(--text-secondary);">No raw config available.</span>';
      return;
    }
    container.textContent = text;
  }

  /**
   * Save the current config changes to the server via Bridge.eph.
   * Sends only the changed fields as a list of key/value pairs.
   */
  async function saveConfig() {
    var changes = [];
    Object.keys(ceState.currentConfig).forEach(function(key) {
      if (String(ceState.currentConfig[key]) !== String(ceState.originalConfig[key])) {
        changes.push({ key: key, value: ceState.currentConfig[key] });
      }
    });

    if (changes.length === 0) return;

    var btn = document.getElementById('ce-save-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Saving...';

    var resp = await gossamerInvoke('set_config', {
      server_id: gsaState.selectedServerId,
      changes: changes
    });

    btn.innerHTML = 'Save Changes';

    if (!resp.ok) {
      alert('Failed to save config: ' + (resp.error || 'Unknown error'));
      btn.disabled = false;
      return;
    }

    // Refresh to get the new baseline
    await refreshConfigEditor();
  }

  /**
   * Revert the server config to the stored VeriSimDB version.
   * Reloads the config form after revert completes.
   */
  async function revertConfig() {
    if (!confirm('Revert all changes to the stored configuration?')) return;

    var btn = document.getElementById('ce-revert-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Reverting...';

    var resp = await gossamerInvoke('revert_config', {
      server_id: gsaState.selectedServerId
    });

    btn.innerHTML = 'Revert';

    if (!resp.ok) {
      alert('Failed to revert: ' + (resp.error || 'Unknown error'));
      btn.disabled = false;
      return;
    }

    await refreshConfigEditor();
  }

  /**
   * Toggle visibility of a secret (password) input field.
   *
   * @param {HTMLElement} btn - The toggle button element
   */
  function toggleSecretVisibility(btn) {
    var input = btn.parentElement.querySelector('input');
    if (input) {
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  }

  // Listen for server selection changes
  document.addEventListener('gsa-server-selected', function() {
    if (gsaState.activePanel === 'config-editor') {
      refreshConfigEditor();
    }
  });
</script>
