# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Cerro Torre manifest — CryoFall server .ctp bundle
#
# Used by `ct pack` to create a verified container bundle.
# The bundle is deployed to Verpex VPS and managed by Game Server Admin.

[metadata]
name        = "cryofall-server"
version     = "1200170"          # SteamCMD AppID used as canonical version ref
revision    = 1
summary     = "CryoFall dedicated server managed by Game Server Admin"
description = """
CryoFall (AtomicTorch Studio) dedicated server containerised for deployment
on Verpex VPS.  Managed via the Game Server Admin (GSA) Gossamer GUI and
Zig FFI layer.  Game files are installed on first start via SteamCMD (AppID
1200170) into a persistent volume, so image rebuilds do not re-download the
game.  World saves and server config live in separate persistent volumes.
"""
license     = "AGPL-3.0-or-later"
homepage    = "https://github.com/hyperpolymath/game-server-admin"
maintainer  = "Jonathan D.A. Jewell <j.d.a.jewell@open.ac.uk>"

[provenance]
upstream    = "https://store.steampowered.com/app/829590/CryoFall/"
import_date = 2026-04-04T00:00:00Z

[dependencies]
runtime = ["lib32gcc-s1", "libstdc++6", "libstdc++6:i386", "ca-certificates", "iproute2"]
build   = ["curl"]

[build]
system = "podman"
containerfile = "container/cryofall/Containerfile"

[build.environment]
CRYOFALL_APPID          = "1200170"
CRYOFALL_INSTALL_DIR    = "/opt/cryofall"
CRYOFALL_DATA_DIR       = "/data/cryofall"
CRYOFALL_BACKUP_DIR     = "/data/backups"

[outputs]
primary = "cryofall-server"
split   = []

[attestations]
require     = ["source-signature", "sbom-complete"]
recommend   = ["security-audit"]

[security]
user  = "cryofall"
group = "cryofall"
read_only_root   = false   # SteamCMD writes to install volume at runtime
no_new_privileges = true

[security.capabilities]
drop = ["ALL"]
add  = []   # No special capabilities needed — UDP bind uses EXPOSE not CAP_NET_BIND_SERVICE

[security.network]
listen_udp = [6000, 6001]

[security.filesystem]
read    = ["/app/defaults/", "/opt/cryofall/", "/data/cryofall/", "/data/backups/"]
write   = ["/opt/cryofall/", "/data/cryofall/", "/data/backups/", "/tmp/"]
execute = ["/app/entrypoint.sh", "/scripts/backup.sh", "/usr/local/bin/steamcmd"]
